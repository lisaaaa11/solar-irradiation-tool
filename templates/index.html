<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar Irradiation Tool</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <h1>Solar Irradiation Tool</h1>
    <p class="subtitle">
      Globalstrahlung aus der offenen CDC-Datenplattform des DWD
    </p>

    <section class="card">
      <h2>Monatsdaten</h2>
      <label for="monthSelect">Monat auswählen</label>
      <div class="controls">
        <select id="monthSelect">
          {% for item in months %}
            <option value="{{ item.year }}-{{ item.month }}">
              {{ item.label }}
            </option>
          {% endfor %}
        </select>

        <button id="loadMonthButton">Monatsdaten laden</button>
      </div>
    </section>

    <section class="card">
      <h2>5-Jahres-Heatmap</h2>
      <label for="blockSelect">Zeitraum auswählen</label>
      <div class="controls">
        <select id="blockSelect">
          {% for block in blocks %}
            <option value="{{ block.start_year }}-{{ block.end_year }}">
              {{ block.label }}
            </option>
          {% endfor %}
        </select>

        <button id="loadBlockButton">Heatmap laden</button>
      </div>
    </section>

    <section class="card">
      <h2>Ergebnis</h2>
      <div id="result">
        <p>Noch keine Daten geladen.</p>
      </div>
    </section>

    <section class="card">
      <h2>Heatmap</h2>
      <canvas id="heatmapCanvas"></canvas>
      <div id="tooltip" class="tooltip" style="display: none;"></div>
    </section>

    <section class="card">
      <h2>Zeitreihe</h2>
      <p id="chartInfo">Noch keine Rasterzelle ausgewählt.</p>
      <canvas id="timeseriesCanvas"></canvas>
    </section>
  </main>

  <script>
    let currentGrid = null;
    let currentMin = null;
    let currentMax = null;
    let selectedStartYear = null;
    let selectedEndYear = null;

    async function loadMonthData() {
      const select = document.getElementById("monthSelect");
      const result = document.getElementById("result");
      const value = select.value;

      const [year, month] = value.split("-");

      result.innerHTML = "<p>Lade Monatsdaten ...</p>";

      try {
        const response = await fetch(`/api/month-data?year=${year}&month=${month}`);
        const data = await response.json();

        if (!response.ok) {
          result.innerHTML = `<p class="error">Fehler: ${data.error}</p>`;
          return;
        }

        result.innerHTML = `
          <div class="result-grid">
            <div><strong>Jahr</strong><br>${data.year}</div>
            <div><strong>Monat</strong><br>${data.month}</div>
            <div><strong>Einheit</strong><br>${data.unit}</div>
            <div><strong>Durchschnitt</strong><br>${data.avg_radiation.toFixed(2)} ${data.unit}</div>
          </div>
        `;
      } catch (error) {
        result.innerHTML = `<p class="error">Fehler beim Laden der Monatsdaten.</p>`;
      }
    }

    function flattenValidValues(grid) {
      const values = [];

      for (const row of grid) {
        for (const value of row) {
          if (value !== null && !Number.isNaN(value)) {
            values.push(value);
          }
        }
      }

      return values;
    }

    function getPercentile(sortedValues, percentile) {
      const index = Math.floor((percentile / 100) * (sortedValues.length - 1));
      return sortedValues[index];
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function interpolateColor(stops, t) {
      for (let i = 0; i < stops.length - 1; i++) {
        const a = stops[i];
        const b = stops[i + 1];

        if (t >= a.pos && t <= b.pos) {
          const localT = (t - a.pos) / (b.pos - a.pos);

          const r = Math.round(a.color[0] + (b.color[0] - a.color[0]) * localT);
          const g = Math.round(a.color[1] + (b.color[1] - a.color[1]) * localT);
          const bCol = Math.round(a.color[2] + (b.color[2] - a.color[2]) * localT);

          return `rgb(${r},${g},${bCol})`;
        }
      }

      const last = stops[stops.length - 1].color;
      return `rgb(${last[0]},${last[1]},${last[2]})`;
    }

    function getColor(value, min, max) {
      if (value === null || Number.isNaN(value)) {
        return "rgb(240, 240, 240)";
      }

      const t = clamp((value - min) / (max - min), 0, 1);

      const colorStops = [
        { pos: 0.00, color: [49, 54, 149] },
        { pos: 0.20, color: [69, 117, 180] },
        { pos: 0.40, color: [102, 194, 165] },
        { pos: 0.60, color: [171, 221, 164] },
        { pos: 0.75, color: [255, 255, 191] },
        { pos: 0.88, color: [253, 174, 97] },
        { pos: 1.00, color: [215, 25, 28] }
      ];

      return interpolateColor(colorStops, t);
    }

    function drawHeatmap(grid) {
      const canvas = document.getElementById("heatmapCanvas");
      const ctx = canvas.getContext("2d");

      const rows = grid.length;
      const cols = grid[0].length;

      const scale = 1;
      canvas.width = cols * scale;
      canvas.height = rows * scale;

      const validValues = flattenValidValues(grid).sort((a, b) => a - b);

      if (validValues.length === 0) {
        return;
      }

      const min = getPercentile(validValues, 5);
      const max = getPercentile(validValues, 95);

      currentGrid = grid;
      currentMin = min;
      currentMax = max;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const value = grid[y][x];
          ctx.fillStyle = getColor(value, min, max);
          ctx.fillRect(x * scale, y * scale, scale, scale);
        }
      }
    }

    async function loadBlockGrid() {
      const value = document.getElementById("blockSelect").value;
      const result = document.getElementById("result");

      const [startYear, endYear] = value.split("-");

      result.innerHTML = "<p>Lade 5-Jahres-Heatmap ...</p>";

      try {
        const response = await fetch(`/api/block-grid?start_year=${startYear}&end_year=${endYear}`);
        const data = await response.json();

        if (!response.ok) {
          result.innerHTML = `<p class="error">Fehler: ${data.error}</p>`;
          return;
        }

        selectedStartYear = Number(startYear);
        selectedEndYear = Number(endYear);

        result.innerHTML = `
          <div class="result-grid">
            <div><strong>Zeitraum</strong><br>${data.start_year}-${data.end_year}</div>
            <div><strong>Einheit</strong><br>${data.unit}</div>
            <div><strong>Rastergröße</strong><br>${data.ncols} × ${data.nrows}</div>
          </div>
        `;

        drawHeatmap(data.grid);
      } catch (error) {
        result.innerHTML = `<p class="error">Fehler beim Laden der Heatmap.</p>`;
      }
    }

    async function loadCellTimeseries(x, y) {
      const chartInfo = document.getElementById("chartInfo");

      if (!selectedStartYear || !selectedEndYear) {
        chartInfo.textContent = "Bitte zuerst eine 5-Jahres-Heatmap laden.";
        return;
      }

      chartInfo.textContent = `Lade Zeitreihe für Zelle x=${x}, y=${y} ...`;

      try {
        const response = await fetch(
          `/api/cell-timeseries?start_year=${selectedStartYear}&end_year=${selectedEndYear}&x=${x}&y=${y}`
        );
        const data = await response.json();

        if (!response.ok) {
          chartInfo.textContent = `Fehler: ${data.error}`;
          return;
        }

        chartInfo.textContent =
          `Zeitreihe für ${data.start_year}-${data.end_year}, Zelle x=${data.x}, y=${data.y}`;

        drawTimeseries(data.years, data.values);
      } catch (error) {
        chartInfo.textContent = "Fehler beim Laden der Zeitreihe.";
      }
    }

    function drawTimeseries(years, values) {
      const canvas = document.getElementById("timeseriesCanvas");
      const ctx = canvas.getContext("2d");

      const width = 900;
      const height = 320;
      const padding = 40;

      canvas.width = width;
      canvas.height = height;

      ctx.clearRect(0, 0, width, height);

      const validValues = values.filter(v => v !== null && !Number.isNaN(v));
      if (validValues.length === 0) {
        return;
      }

      const min = Math.min(...validValues);
      const max = Math.max(...validValues);

      ctx.strokeStyle = "#333";
      ctx.lineWidth = 1;

      ctx.beginPath();
      ctx.moveTo(padding, padding);
      ctx.lineTo(padding, height - padding);
      ctx.lineTo(width - padding, height - padding);
      ctx.stroke();

      ctx.fillStyle = "#333";
      ctx.font = "12px Arial";

      years.forEach((year, i) => {
        const x = padding + (i / (years.length - 1 || 1)) * (width - 2 * padding);
        ctx.fillText(String(year), x - 12, height - padding + 18);
      });

      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 2;
      ctx.beginPath();

      values.forEach((value, i) => {
        if (value === null || Number.isNaN(value)) return;

        const x = padding + (i / (years.length - 1 || 1)) * (width - 2 * padding);
        const y = height - padding - ((value - min) / (max - min || 1)) * (height - 2 * padding);

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });

      ctx.stroke();

      ctx.fillStyle = "#dc2626";
      values.forEach((value, i) => {
        if (value === null || Number.isNaN(value)) return;

        const x = padding + (i / (years.length - 1 || 1)) * (width - 2 * padding);
        const y = height - padding - ((value - min) / (max - min || 1)) * (height - 2 * padding);

        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function setupCanvasHover() {
      const canvas = document.getElementById("heatmapCanvas");
      const tooltip = document.getElementById("tooltip");

      canvas.addEventListener("mousemove", (event) => {
        if (!currentGrid) return;

        const rect = canvas.getBoundingClientRect();

        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const x = Math.floor((event.clientX - rect.left) * scaleX);
        const y = Math.floor((event.clientY - rect.top) * scaleY);

        if (
          y < 0 ||
          y >= currentGrid.length ||
          x < 0 ||
          x >= currentGrid[0].length
        ) {
          tooltip.style.display = "none";
          return;
        }

        const value = currentGrid[y][x];

        if (value === null || Number.isNaN(value)) {
          tooltip.style.display = "none";
          return;
        }

        tooltip.style.display = "block";
        tooltip.style.left = `${event.pageX + 12}px`;
        tooltip.style.top = `${event.pageY + 12}px`;
        tooltip.innerHTML = `
          <strong>Wert</strong><br>
          ${value.toFixed(2)} kWh/m²<br>
          Zelle: x=${x}, y=${y}
        `;
      });

      canvas.addEventListener("mouseleave", () => {
        tooltip.style.display = "none";
      });

      canvas.addEventListener("click", (event) => {
        if (!currentGrid) return;

        const rect = canvas.getBoundingClientRect();

        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const x = Math.floor((event.clientX - rect.left) * scaleX);
        const y = Math.floor((event.clientY - rect.top) * scaleY);

        if (
          y < 0 ||
          y >= currentGrid.length ||
          x < 0 ||
          x >= currentGrid[0].length
        ) {
          return;
        }

        const value = currentGrid[y][x];

        if (value === null || Number.isNaN(value)) {
          return;
        }

        loadCellTimeseries(x, y);
      });
    }

    document.getElementById("loadMonthButton").addEventListener("click", loadMonthData);
    document.getElementById("loadBlockButton").addEventListener("click", loadBlockGrid);

    setupCanvasHover();
  </script>
</body>
</html>
