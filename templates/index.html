<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar Irradiation Tool</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Solar Irradiation Tool</h1>
      <p class="subtitle">Monthly Insights auf Basis der DWD-Daten</p>

      <div class="controls">
        <div>
          <label for="startYear">Startjahr</label>
          <input id="startYear" type="number" value="{{ default_start }}">
        </div>
        <div>
          <label for="endYear">Endjahr</label>
          <input id="endYear" type="number" value="{{ default_end }}">
        </div>
        <div class="button-wrap">
          <button id="loadButton">Laden</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Monthly Trend vs Yearly Average</h2>
      <canvas id="overlayChart"></canvas>
    </section>

    <section class="card">
      <h2>Seasonal Variability Heatmap</h2>
      <div id="heatmapTable"></div>
    </section>
  </main>

  <script>
    const startYearInput = document.getElementById("startYear");
    const endYearInput = document.getElementById("endYear");
    const loadButton = document.getElementById("loadButton");

    let overlayChart = null;

    async function fetchJson(url) {
      const response = await fetch(url);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Fehler beim Laden");
      return data;
    }

    function renderOverlayChart(data) {
      if (overlayChart) overlayChart.destroy();

      overlayChart = new Chart(document.getElementById("overlayChart"), {
        type: "line",
        data: {
          labels: data.months,
          datasets: [
            {
              label: "Monthly Average",
              data: data.monthly_values,
              borderColor: "#2563eb",
              backgroundColor: "#2563eb",
              tension: 0.25
            },
            {
              label: "Yearly Average",
              data: data.yearly_average_line,
              borderColor: "#6b7280",
              borderDash: [6, 6],
              pointRadius: 0
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: "top" }
          },
          scales: {
            y: {
              title: {
                display: true,
                text: data.unit
              }
            }
          }
        }
      });
    }

    function colorForValue(value, min, max) {
      const t = (value - min) / ((max - min) || 1);
      const x = Math.max(0, Math.min(1, t));
      const r = Math.round(235 - x * 120);
      const g = Math.round(245 - x * 110);
      const b = Math.round(255 - x * 20);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function renderHeatmapTable(data) {
      const container = document.getElementById("heatmapTable");
      const flatValues = data.values.flat().filter(v => v !== null);
      const min = Math.min(...flatValues);
      const max = Math.max(...flatValues);

      let html = '<table class="heatmap"><thead><tr><th>Jahr</th>';
      for (const month of data.months) {
        html += `<th>${month}</th>`;
      }
      html += "</tr></thead><tbody>";

      data.years.forEach((year, rowIndex) => {
        html += `<tr><th>${year}</th>`;
        data.values[rowIndex].forEach(value => {
          if (value === null) {
            html += '<td class="empty">–</td>';
          } else {
            html += `<td style="background:${colorForValue(value, min, max)}">${value}</td>`;
          }
        });
        html += "</tr>";
      });

      html += "</tbody></table>";
      container.innerHTML = html;
    }

    async function loadCharts() {
      const startYear = startYearInput.value;
      const endYear = endYearInput.value;

      const overlayData = await fetchJson(`/api/monthly-overlay?start_year=${startYear}&end_year=${endYear}`);
      renderOverlayChart(overlayData);

      const heatmapData = await fetchJson(`/api/seasonal-heatmap?start_year=${startYear}&end_year=${endYear}`);
      renderHeatmapTable(heatmapData);
    }

    loadButton.addEventListener("click", loadCharts);
    //loadCharts();
  </script>
</body>
</html>
